<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d0a1a"/>
  <!-- Portal ring -->
  <ellipse cx="50" cy="50" rx="32" ry="32" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="22" ry="22" fill="none" stroke="#b44aff" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner glow -->
  <circle cx="50" cy="50" r="12" fill="#0d0a1a" stroke="#ff6b2b" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="5" fill="#00f0ff" opacity="0.7"/>
  <!-- X mark -->
  <text x="50" y="58" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#00f0ff" opacity="0.9">X</text>
</svg>
