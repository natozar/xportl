<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0a1a" />
    <meta name="description" content="XPortl - A Realidade Aumentada de Capsulas do Tempo" />

    <!-- Security headers -->
    <!-- X-Frame-Options and X-Content-Type-Options are set as HTTP headers in
         vercel.json; browsers now hard-reject these when set via <meta>. Only
         referrer can be configured here. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- PWA: Android / General capable -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA: iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="XPortl" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- iOS splash screens (covers most devices) -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- PWA: Android / General -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect hints for faster CDN loads -->
    <link rel="preconnect" href="https://aframe.io" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://raw.githack.com" crossorigin />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-eval' 'unsafe-inline' https://aframe.io https://unpkg.com https://raw.githack.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
      img-src 'self' data: blob: https://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org;
      media-src 'self' blob: https://*.supabase.co;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://aframe.io https://unpkg.com https://raw.githack.com https://cdn.jsdelivr.net;
      font-src 'self' https://cdn.aframe.io https://fonts.gstatic.com;
      worker-src 'self' blob:;
    " />

    <title>XPortl</title>

    <!-- A-Frame + AR.js (defer so they don't block First Paint) -->
    <script defer src="https://aframe.io/releases/1.3.0/aframe.min.js" crossorigin="anonymous"></script>
    <script defer src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js" crossorigin="anonymous"></script>

    <!-- App Shell: instant paint while JS boots -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #07040F;
        color: #F4EFE6;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        overscroll-behavior: none;
      }
      #app-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 34px;
        background:
          radial-gradient(circle at 50% 38%, rgba(111, 247, 255, 0.10), transparent 55%),
          radial-gradient(circle at 50% 82%, rgba(167, 123, 255, 0.08), transparent 60%),
          #07040F;
        z-index: 9999;
        transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #app-shell.hidden { opacity: 0; pointer-events: none; }

      /* Hair-thin ring stack forming a portal */
      #app-shell .portal {
        position: relative;
        width: 136px;
        height: 136px;
        border-radius: 50%;
        border: 1px solid rgba(111, 247, 255, 0.35);
        box-shadow:
          0 0 80px rgba(111, 247, 255, 0.22),
          inset 0 0 50px rgba(111, 247, 255, 0.12);
        animation: shell-pulse 2.6s ease-in-out infinite;
      }
      #app-shell .portal::before,
      #app-shell .portal::after {
        content: '';
        position: absolute;
        inset: 16px;
        border-radius: 50%;
        border: 1px solid rgba(167, 123, 255, 0.32);
      }
      #app-shell .portal::after {
        inset: 38px;
        border-color: rgba(111, 247, 255, 0.55);
        box-shadow: 0 0 28px rgba(111, 247, 255, 0.35);
      }
      /* Sweeping hairline */
      #app-shell .portal .sweep {
        position: absolute;
        top: 50%; left: 50%;
        width: 100%; height: 1px;
        background: linear-gradient(to right, transparent, rgba(111, 247, 255, 0.9), transparent);
        transform-origin: 0 50%;
        animation: shell-sweep 3s linear infinite;
        opacity: 0.8;
      }

      #app-shell .brand {
        font-family: "Fraunces", Georgia, serif;
        font-size: 1.6rem;
        letter-spacing: -0.015em;
        color: #F4EFE6;
        font-weight: 400;
        font-style: italic;
      }
      #app-shell .brand .d { color: #FF8A5C; font-style: normal; }

      #app-shell .tag {
        font-family: ui-monospace, "JetBrains Mono", monospace;
        font-size: 0.66rem;
        letter-spacing: 0.28em;
        color: rgba(244, 239, 230, 0.45);
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      #app-shell .tag::before {
        content: '';
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #9FE870;
        box-shadow: 0 0 10px #9FE870;
        animation: shell-blink 1.4s ease-in-out infinite;
      }

      @keyframes shell-pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50%      { transform: scale(1.05); opacity: 1; }
      }
      @keyframes shell-sweep {
        to { transform: rotate(360deg); }
      }
      @keyframes shell-blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.25; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-shell .portal,
        #app-shell .portal .sweep,
        #app-shell .tag::before { animation: none; }
        #app-shell.hidden { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-shell" aria-hidden="true">
      <div class="portal"><span class="sweep"></span></div>
      <div class="brand">xportl<span class="d">.</span></div>
      <div class="tag">abrindo portal</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
